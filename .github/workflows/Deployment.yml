# Workflow to Lint, Test & Deploy on push
name: Deploy
on: [push]
jobs:
	deploy:
		runs-on: ubuntu-latest
    # Run the lint, test & build scripts
		steps:
      - name: Get code
        uses: actions/checkout@v6
		  - name: Install NodeJS
        uses: actions/setup-node@v6
        with: 
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run lint script
        run: npm lint
      - name: Run Tests
        run: npm test
      - name: Build
        run: npm build
